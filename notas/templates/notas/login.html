{% extends 'notas/base.html' %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>Iniciar Sesión</h1>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Usuario:</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            
            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <button type="submit" class="btn-login">Iniciar Sesión</button>
            <a href="{% url 'registro' %}" class="btn-registro">¿No tienes cuenta? Regístrate</a>
            <div style="text-align: center; margin-top: 15px;">
                <a href="{% url 'password_reset' %}" style="color: #007bff;">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-container {
        max-width: 450px;
        margin: 80px auto;
        background: white;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .form-container h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
    }
    .form-group input:focus {
        outline: none;
        border-color: #007bff;
    }
    .btn-login {
        background: #007bff;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        margin-bottom: 10px;
    }
    .btn-login:hover {
        background: #0056b3;
    }
    .btn-registro {
        display: block;
        text-align: center;
        background: #28a745;
        color: white;
        padding: 12px;
        text-decoration: none;
        border-radius: 8px;
        font-size: 16px;
    }
    .btn-registro:hover {
        background: #218838;
        color: white;
    }
    .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        border: 1px solid #f5c6cb;
    }
    .success-message {
        background: #d4edda;
        color: #155724;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        border: 1px solid #c3e6cb;
    }
</style>
{% endblock %}
