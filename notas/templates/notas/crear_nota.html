{% extends 'notas/base.html' %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <i class="bi bi-plus-circle"></i>
        <h2>Crear Nueva Nota</h2>
        <p>Escribe tus ideas, pensamientos o recordatorios</p>
    </div>

    <form method="post" class="modern-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_titulo">
                <i class="bi bi-type"></i> Título
            </label>
            {{ form.titulo }}
        </div>
        
        <div class="form-group">
            <label for="id_contenido">
                <i class="bi bi-file-text"></i> Contenido
            </label>
            {{ form.contenido }}
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">
                <i class="bi bi-save"></i> Guardar Nota
            </button>
            <a href="{% url 'lista_notas' %}" class="btn-cancel">
                <i class="bi bi-x-lg"></i> Cancelar
            </a>
        </div>
    </form>
</div>

<style>
    .form-container {
        max-width: 700px;
        margin: 40px auto;
    }
    
    .form-header {
        text-align: center;
        margin-bottom: 32px;
    }
    
    .form-header i {
        font-size: 48px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .form-header h2 {
        font-size: 1.8rem;
        color: #1f2937;
        margin-top: 12px;
        font-weight: 600;
    }
    
    .form-header p {
        color: #6b7280;
        margin-top: 8px;
    }
    
    .modern-form {
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    
    .form-group {
        margin-bottom: 24px;
    }
    
    .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
        font-size: 14px;
    }
    
    .form-group label i {
        color: #4f46e5;
        font-size: 16px;
    }
    
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 16px;
        font-size: 15px;
        font-family: inherit;
        transition: all 0.2s;
        background: #f9fafb;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #4f46e5;
        background: white;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    
    .form-group textarea {
        resize: vertical;
        min-height: 180px;
    }
    
    .form-actions {
        display: flex;
        gap: 16px;
        margin-top: 32px;
    }
    
    .btn-submit {
        flex: 1;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 40px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }
    
    .btn-cancel {
        flex: 1;
        background: #f3f4f6;
        color: #6b7280;
        padding: 12px 24px;
        border-radius: 40px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
    }
    
    .btn-cancel:hover {
        background: #e5e7eb;
        color: #374151;
        transform: translateY(-2px);
    }
    
    @media (max-width: 640px) {
        .modern-form {
            padding: 24px;
        }
        
        .form-actions {
            flex-direction: column;
        }
    }
</style>
{% endblock %}
