{% extends 'notas/base.html' %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <i class="bi bi-lock"></i>
        <h2>Nueva contraseña</h2>
        <p>Ingresa tu nueva contraseña</p>
    </div>

    <form method="post" class="modern-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_new_password1">
                <i class="bi bi-key"></i> Nueva contraseña
            </label>
            {{ form.new_password1 }}
        </div>
        
        <div class="form-group">
            <label for="id_new_password2">
                <i class="bi bi-shield-check"></i> Confirmar contraseña
            </label>
            {{ form.new_password2 }}
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">
                <i class="bi bi-check-lg"></i> Cambiar contraseña
            </button>
        </div>
    </form>
</div>

<style>
    .form-container {
        max-width: 500px;
        margin: 60px auto;
    }
    
    .form-header {
        text-align: center;
        margin-bottom: 32px;
    }
    
    .form-header i {
        font-size: 56px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .form-header h2 {
        font-size: 1.6rem;
        color: #1f2937;
        margin-top: 16px;
        font-weight: 600;
    }
    
    .form-header p {
        color: #6b7280;
        margin-top: 8px;
    }
    
    .modern-form {
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    
    .form-group {
        margin-bottom: 24px;
    }
    
    .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
        font-size: 14px;
    }
    
    .form-group label i {
        color: #4f46e5;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 16px;
        font-size: 15px;
        transition: all 0.2s;
        background: #f9fafb;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #4f46e5;
        background: white;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    
    .form-actions {
        margin-top: 24px;
    }
    
    .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 40px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }
</style>
{% endblock %}
