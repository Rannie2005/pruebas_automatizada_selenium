{% extends 'notas/base.html' %}

{% block content %}
<div class="success-container">
    <div class="success-icon">
        <i class="bi bi-check-circle-fill"></i>
    </div>
    <h2>¡Contraseña actualizada!</h2>
    <p>Tu contraseña ha sido cambiada exitosamente.</p>
    <a href="{% url 'login' %}" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
    </a>
</div>

<style>
    .success-container {
        max-width: 500px;
        margin: 80px auto;
        text-align: center;
        background: white;
        padding: 48px 32px;
        border-radius: 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    
    .success-icon i {
        font-size: 72px;
        color: #10b981;
        margin-bottom: 24px;
        display: block;
    }
    
    .success-container h2 {
        font-size: 1.8rem;
        color: #1f2937;
        margin-bottom: 16px;
    }
    
    .success-container p {
        color: #6b7280;
        margin-bottom: 32px;
    }
    
    .btn-login {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        padding: 12px 32px;
        border-radius: 40px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.2s;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }
</style>
{% endblock %}
